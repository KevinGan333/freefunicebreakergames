<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, follow">
  <title>Guess the Sound</title><link rel="stylesheet" href="/assets/css/style.css">
  <script src="/assets/js/share.js"></script></head>
<body class="embed-game">
<h2>🔊 Guess the Sound</h2>
<p class="embed-subtitle">Read the sound aloud and guess what makes it!</p>
<div class="sound-prompt" id="soundDisplay" style="font-size:2rem;font-weight:700;color:#7c3aed;margin:1rem 0;">Click Next!</div>
<div class="answer-reveal" id="answerDisplay"></div>
<div>
  <button id="revealBtn" class="embed-btn">👀 Reveal Source</button>
  <button id="nextBtn" class="embed-btn embed-btn-secondary">Next Sound ➡️</button>
</div>
<div class="embed-feedback" id="feedback"></div>
<script>(function(){"use strict";
var sounds=[{s:"Ding-dong!",a:"A doorbell"},{s:"Splash!",a:"Something falling into water"},{s:"Tick-tock, tick-tock",a:"A clock"},{s:"Vroom... screech!",a:"A car braking suddenly"},{s:"Buzzzzz...",a:"A bee or mosquito"},{s:"Crash! Bang! Clatter!",a:"Someone dropping a pile of dishes"},{s:"Drip... drop... drip...",a:"A leaky faucet"},{s:"Whoosh... rumble...",a:"A train passing by"},{s:"Chirp chirp! Tweet tweet!",a:"Birds singing in the morning"},{s:"Pop! Fizzzz...",a:"Opening a soda can"},{s:"Thump... thump... thump...",a:"A heartbeat or footsteps upstairs"},{s:"Woof! Woof! Grrr...",a:"A dog barking at something"},{s:"Click-click-click...",a:"Someone typing on a keyboard"},{s:"Pitter-patter... BOOM!",a:"Rain turning into thunder"},{s:"Creak... slam!",a:"An old door closing"}];
var sEl=document.getElementById("soundDisplay"),aEl=document.getElementById("answerDisplay"),f=document.getElementById("feedback"),last=-1,current="",c=0;
function showSound(){var i;do{i=Math.floor(Math.random()*sounds.length)}while(i===last&&sounds.length>1);last=i;c++;var s=sounds[i];sEl.textContent=""+s.s+"";aEl.textContent=s.a;aEl.classList.remove("visible");current=s.a;f.textContent="Sound #"+c+" — what makes this sound?";}
document.getElementById("revealBtn").addEventListener("click",function(){aEl.classList.add("visible");f.textContent="Sound #"+c+" — "+current+"!";});
document.getElementById("nextBtn").addEventListener("click",showSound);
showSound();})();</script>

  <!-- Gentle Share Panel -->
  <div class="embed-share-panel">
    <h3 class="embed-share-panel__title">Share your moment</h3>
    <p class="embed-share-panel__desc">Copy the current prompt or share a gentle note. Nothing is saved or posted automatically.</p>
    <div class="embed-share-panel__actions">
      <button id="sharePromptBtn" class="embed-btn embed-btn-outline" type="button">📋 Copy Prompt</button>
      <button id="shareNoteBtn" class="embed-btn embed-btn-outline" type="button">💬 Copy Gentle Share Note</button>
    </div>
    <div class="embed-share-panel__status" id="embedShareStatus" aria-live="polite"></div>
    <p class="privacy-note">Nothing is saved. Nothing is posted automatically. Not perfect. Just shared.</p>
  </div>

  <script>
    (function () {
      "use strict";
      // Gentle Share wiring for embed games
      var statusEl = document.getElementById("embedShareStatus");
      var copyPromptBtn = document.getElementById("sharePromptBtn");
      var copyNoteBtn = document.getElementById("shareNoteBtn");
      var responseEl = document.getElementById("embedResponse");
      var clearBtn = document.getElementById("clearResponseBtn");

      // Helper: find the main display/prompt element
      function getPromptText() {
        // Try common output/display element IDs
        var ids = ["rqDisplay","wyrDisplay","totDisplay","emojiDisplay","display","question","prompt","soundDisplay","clueDisplay","qText"];
        for (var i = 0; i < ids.length; i++) {
          var el = document.getElementById(ids[i]);
          if (el && el.textContent.trim()) {
            var txt = el.textContent.trim();
            // Skip placeholder texts
            if (txt.indexOf("Click") === 0 || txt.indexOf("Loading") === 0 || txt === "Spin to get a question!") continue;
            return txt;
          }
        }
        // Try elements with class embed-output
        var outputs = document.querySelectorAll(".embed-output");
        for (var j = 0; j < outputs.length; j++) {
          var ot = outputs[j].textContent.trim();
          if (ot && ot.indexOf("Click") !== 0 && ot.indexOf("Loading") !== 0) return ot;
        }
        return "";
      }

      // Copy Prompt
      if (copyPromptBtn) {
        copyPromptBtn.addEventListener("click", function () {
          var text = getPromptText();
          if (!text) { if (statusEl) statusEl.textContent = "Generate a prompt first."; return; }
          if (typeof copyToClipboard === "function") {
            copyToClipboard(text, statusEl);
          } else if (statusEl) {
            statusEl.textContent = "Copy function not available.";
          }
        });
      }

      // Copy Gentle Share Note
      if (copyNoteBtn) {
        copyNoteBtn.addEventListener("click", function () {
          var prompt = getPromptText();
          var response = responseEl ? responseEl.value.trim() : "";
          var title = document.title.replace(" — Game", "").replace(" — Free Online Icebreaker", "").trim();
          var note = "I tried a low-pressure icebreaker on Free Fun Icebreaker Games.\n\nPrompt:\n" + (prompt || "(a gentle moment)") + "\n";
          if (response) { note += "\nMy pressure-free response:\n" + response + "\n"; }
          note += "\nNot perfect. Just shared.\n\n" + window.location.href;
          if (typeof copyToClipboard === "function") {
            copyToClipboard(note, statusEl);
          } else if (statusEl) {
            statusEl.textContent = "Copy function not available.";
          }
        });
      }

      // Clear Response
      if (clearBtn && responseEl) {
        clearBtn.addEventListener("click", function () {
          responseEl.value = "";
          if (statusEl) statusEl.textContent = "Response cleared.";
        });
      }
    })();
  </script>
</body></html>
